# Percorso del file che definisce i permessi (ruoli ammessi) su ciascun
# endpoint. Percorso relativo alla working directory con cui parte il
# server. Modificabile e ricaricato in automatico senza riavviare il
# server: vedi quel file per le istruzioni.
permessi.file=config/permessi-endpoint.properties

# Raccomandazioni: numero massimo di elementi distinti (righe BOM) che possono
# mancare perché un progetto venga comunque consigliato. I progetti del tutto
# realizzabili sono sempre inclusi, a prescindere da questo valore.
# Il valore di default può essere sovrascritto per singola richiesta con
# il metodo GET /api/progetti/consigliati?sogliaMancanti=N
soglia.progetti.consigliati=3