# ============================================================================
#  PERMESSI SUGLI ENDPOINT DI MAKERMANAGER-SERVER
# ============================================================================
#
# Questo file decide chi puo' raggiungere ciascun endpoint dell'API.
# Viene ricaricato AUTOMATICAMENTE quando lo modifichi e salvi: non serve
# ricompilare ne' riavviare il server.
#
# --- FORMATO DI OGNI REGOLA -------------------------------------------------
#
# Ogni regola e' composta da 3 righe con lo stesso indice N (un numero
# progressivo a tua scelta, usato solo per definire l'ordine delle regole):
#
#   regola.N.metodo = verbo HTTP della richiesta.
#                      Valori ammessi: GET, POST, PUT, DELETE, PATCH, ...
#                      oppure ANY per applicare la regola a qualunque verbo.
#
#   regola.N.path   = pattern del path a cui si applica la regola.
#                      Supporta i wildcard in stile Ant di Spring:
#                        *   un singolo segmento di path (es. /api/foo/*)
#                        **  qualsiasi cosa, anche piu' segmenti
#                            (es. /api/foo/** copre /api/foo/1, /api/foo/1/bar, ...)
#
#   regola.N.ruoli  = elenco separato da virgole dei ruoli che possono
#                      accedere. Valori ammessi:
#                        PUBBLICO    -> chiunque, anche senza aver fatto il login
#                        AUTENTICATO -> qualunque utente che abbia fatto login
#                                       (sia ruolo UTENTE che ADMIN)
#                        ADMIN       -> solo utenti con ruolo ADMIN
#                        UTENTE      -> solo utenti con ruolo UTENTE
#                      Si possono combinare piu' valori, es: UTENTE,ADMIN
#                      (equivalente ad AUTENTICATO, scritto in modo esplicito)
#
# --- ORDINE DI VALUTAZIONE ---------------------------------------------------
#
# Le regole vengono lette IN ORDINE NUMERICO CRESCENTE di indice: la PRIMA
# il cui metodo+path corrispondono alla richiesta ricevuta viene applicata,
# tutte le successive vengono ignorate. Per questo motivo le regole piu'
# SPECIFICHE (path senza wildcard, o con wildcard piu' stretti) vanno messe
# PRIMA di quelle piu' generiche che potrebbero sovrapporsi.
#
# Una richiesta che non corrisponde a NESSUNA regola viene rifiutata
# (nega di default: ogni endpoint deve comparire esplicitamente qui sotto).
#
# --- NOTA SUI PERMESSI "DI PROPRIETA'" ---------------------------------------
#
# Questo file decide solo l'accesso a livello di ENDPOINT (chi puo' provare
# a chiamarlo). Non puo' esprimere regole tipo "solo il proprietario di
# QUESTO specifico inventario/progetto": quel controllo dipende dal dato
# richiesto (di chi e' l'inventario X?), non solo dall'URL, e viene quindi
# applicato piu' in profondita' nei Service (vedi UtenteCorrente,
# InventarioService, ProgettoService). Impostare qui AUTENTICATO per un
# endpoint significa quindi "chiunque abbia fatto login puo' provare a
# chiamarlo", con l'eventuale controllo di proprieta' applicato dopo.
#
# ============================================================================

# TODO

# --- Dispatch interno di errore: deve restare raggiungibile da chiunque,
#     altrimenti Spring Security blocca anche la pagina di errore stessa.
regola.1.metodo=ANY
regola.1.path=/error
regola.1.ruoli=PUBBLICO

# --- Autenticazione (registrazione e login: pubblici per definizione) ------
regola.2.metodo=POST
regola.2.path=/auth/registrazione
regola.2.ruoli=PUBBLICO

regola.3.metodo=POST
regola.3.path=/auth/login
regola.3.ruoli=PUBBLICO

# --- Inizializzazione dati di test (distruttivo: cancella e ricarica tutto,
#     riservato ad ADMIN) ----------------------------------------------------
regola.4.metodo=POST
regola.4.path=/inizializza
regola.4.ruoli=ADMIN

# --- Utenti ------------------------------------------------------------------
regola.5.metodo=GET
regola.5.path=/api/utenti/me
regola.5.ruoli=AUTENTICATO

regola.6.metodo=GET
regola.6.path=/api/utenti
regola.6.ruoli=ADMIN

# --- Catalogo: lettura pubblica (e' il catalogo condiviso dei componenti),
#     scrittura riservata ad ADMIN (cura i contenuti globali) ---------------
regola.7.metodo=POST
regola.7.path=/api/catalogo
regola.7.ruoli=AUTENTICATO

regola.8.metodo=DELETE
regola.8.path=/api/catalogo/**
regola.8.ruoli=ADMIN

regola.9.metodo=GET
regola.9.path=/api/catalogo
regola.9.ruoli=PUBBLICO

regola.10.metodo=GET
regola.10.path=/api/catalogo/**
regola.10.ruoli=PUBBLICO

# --- Progetti: catalogo condiviso, lettura pubblica; creazione e modifica
#     riservate a chi ha fatto login (la proprieta' del singolo progetto
#     e' verificata da ProgettoService) -------------------------------------
regola.11.metodo=GET
regola.11.path=/api/progetti/utente/**
regola.11.ruoli=PUBBLICO

regola.12.metodo=GET
regola.12.path=/api/progetti/tipologia/**
regola.12.ruoli=PUBBLICO

regola.13.metodo=GET
regola.13.path=/api/progetti
regola.13.ruoli=PUBBLICO

regola.14.metodo=GET
regola.14.path=/api/progetti/**
regola.14.ruoli=PUBBLICO

regola.15.metodo=POST
regola.15.path=/api/progetti
regola.15.ruoli=AUTENTICATO

regola.16.metodo=POST
regola.16.path=/api/progetti/**
regola.16.ruoli=AUTENTICATO

regola.17.metodo=DELETE
regola.17.path=/api/progetti/**
regola.17.ruoli=AUTENTICATO

# --- Inventario: dato personale, visibile/gestibile solo dal proprietario
#     o da un ADMIN (la proprieta' del singolo inventario e' verificata da
#     InventarioService); l'elenco di TUTTI gli inventari e' riservato ad
#     ADMIN --------------------------------------------------------------
regola.18.metodo=GET
regola.18.path=/api/inventario
regola.18.ruoli=ADMIN

regola.19.metodo=GET
regola.19.path=/api/inventario/utente/**
regola.19.ruoli=AUTENTICATO

regola.20.metodo=GET
regola.20.path=/api/inventario/**
regola.20.ruoli=AUTENTICATO

regola.21.metodo=POST
regola.21.path=/api/inventario
regola.21.ruoli=AUTENTICATO

regola.22.metodo=POST
regola.22.path=/api/inventario/**
regola.22.ruoli=AUTENTICATO

regola.23.metodo=DELETE
regola.23.path=/api/inventario/**
regola.23.ruoli=AUTENTICATO
